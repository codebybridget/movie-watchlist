<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movie Watchlist</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
 <header>
    <h1>Movie Watchlist</h1>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search movies..." />
      <button id="searchBtn">Search</button>
    </div>
  </header>

  <main>
    <section id="searchResults">
      <h2>Search Results</h2>
      <div id="results" class="movie-grid"></div>
    </section>

    <section id="myList">
      <h2>My Watchlist</h2>

      <div class="lists">
        <div class="list" data-status="will-watch">
          <h3>Will Watch</h3>
          <div id="willWatch" class="movies"></div>
        </div>

   
        <div class="list" data-status="watching">
          <h3>Watching</h3>
          <div id="watching" class="movies"></div>
        </div>

     
        <div class="list" data-status="watched">
          <h3>Watched</h3>
          <div id="watched" class="movies"></div>
        </div>
      </div>
    </section>

  
    <div class="share-box">
      <button id="shareBtn">Share My Watchlist</button>
    </div>
  </main>


  <script src="script.js"></script>
</body>
</html>
